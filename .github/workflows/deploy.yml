name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write
  packages: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/src/**'
              - 'frontend/public/**'
              - 'frontend/package*.json'
              - 'frontend/next.config.*'
              - 'frontend/tailwind.config.*'
              - 'scripts/**'
              - 'backend/data/knowledge/*.json'
            backend:
              - 'backend/src/**'
              - 'backend/Dockerfile'
              - 'backend/pyproject.toml'
              - 'infra/**'
              - 'backend/data/knowledge/*.json'

  build:
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: ${{ secrets.NEXT_PUBLIC_API_BASE_URL }}
          NEXT_PUBLIC_EMAILJS_SERVICE_ID: ${{ secrets.NEXT_PUBLIC_EMAILJS_SERVICE_ID }}
          NEXT_PUBLIC_EMAILJS_TEMPLATE_ID: ${{ secrets.NEXT_PUBLIC_EMAILJS_TEMPLATE_ID }}
          NEXT_PUBLIC_EMAILJS_PUBLIC_KEY: ${{ secrets.NEXT_PUBLIC_EMAILJS_PUBLIC_KEY }}
          NODE_ENV: production

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/out

      # gradeVITian lives at gradevitian.jayaremala.com, served by nginx on the
      # Lightsail box (GitHub Pages can only host the single jayaremala.com domain).
      # Mirror the static export there so the subdomain serves the same build.
      - name: Sync gradeVITian static export to Lightsail
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.LIGHTSAIL_SSH_KEY }}" > ~/.ssh/lightsail.pem
          chmod 600 ~/.ssh/lightsail.pem
          rsync -az --delete \
            -e "ssh -i ~/.ssh/lightsail.pem -o StrictHostKeyChecking=no" \
            frontend/out/ ubuntu@${{ secrets.LIGHTSAIL_HOST }}:/var/www/gv-site/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # Persist the generated knowledge JSON back to the repo. Runs AFTER deploy so
  # the [skip ci] sync commit never moves main's HEAD while the Pages deployment
  # for the run's commit is still pending — which was getting it cancelled.
  sync-knowledge:
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # sync-knowledge.mjs uses only Node built-ins — no install needed.
      - name: Regenerate and commit synced knowledge files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          node scripts/sync-knowledge.mjs
          git add backend/data/knowledge/blog.json backend/data/knowledge/lab.json frontend/src/data/knowledge/
          git diff --staged --quiet || (git commit -m "chore: sync knowledge base [skip ci]" && git pull --rebase --autostash && git push)

  build-backend:
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          provenance: false
          tags: ghcr.io/${{ github.repository_owner }}/itsjaya-backend:latest

  deploy-backend:
    needs: [detect-changes, build-backend]
    if: needs.detect-changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy backend via SSH
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.LIGHTSAIL_SSH_KEY }}" > ~/.ssh/lightsail.pem
          chmod 600 ~/.ssh/lightsail.pem
          ssh -i ~/.ssh/lightsail.pem \
            -o StrictHostKeyChecking=no \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=20 \
            -o ConnectTimeout=30 \
            ubuntu@${{ secrets.LIGHTSAIL_HOST }} \
            "export GHCR_TOKEN='${GHCR_TOKEN}' GHCR_USER='${GHCR_USER}' && \
             cd /home/ubuntu/itsjaya && \
             git fetch origin main && \
             git reset --hard origin/main && \
             bash infra/scripts/deploy.sh"
