name: Weekly Portfolio Digest

on:
  schedule:
    # Monday 9 AM ET = 1 PM UTC (13:00)
    - cron: '0 13 * * 1'
  workflow_dispatch:  # allow manual trigger from GitHub Actions UI

jobs:
  send-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Send weekly digest
        run: |
          if [ -z "$API_BASE_URL" ]; then
            echo "::error::API_BASE_URL secret is empty — set it in repo Settings → Secrets and variables → Actions"
            exit 1
          fi
          curl --fail --silent --show-error \
            -X POST "${API_BASE_URL%/}/admin/digest/send" \
            -H "Authorization: Bearer ${ADMIN_TOKEN}" \
            -H "Content-Type: application/json"
        env:
          API_BASE_URL: ${{ secrets.NEXT_PUBLIC_API_BASE_URL }}
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
