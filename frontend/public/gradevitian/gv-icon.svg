<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <rect width="512" height="512" fill="#4f46e5"/>
  <g>
    <!-- cap / cup (drawn first so the board overlaps its top edge) -->
    <path d="M188 226 L188 300 Q188 340 256 340 Q324 340 324 300 L324 226 Z" fill="#ffffff"/>
    <!-- mortarboard (top board, in perspective) -->
    <path d="M256 156 L420 214 L256 272 L92 214 Z" fill="#ffffff"/>
    <!-- tassel cord (drawn before the button so the button stays a clean stud) -->
    <path d="M256 212 L420 214 L420 300" fill="none" stroke="#ffffff" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- tassel knot + tuft -->
    <circle cx="420" cy="300" r="11" fill="#ffffff"/>
    <rect x="410" y="304" width="20" height="44" rx="10" fill="#ffffff"/>
    <!-- centre button -->
    <circle cx="256" cy="212" r="13" fill="#4f46e5"/>
  </g>
</svg>