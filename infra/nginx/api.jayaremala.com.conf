# api.jayaremala.com — itsjaya backend (FastAPI + public MCP server)
#
# Reverse-proxies everything to the blue-green Docker container on 127.0.0.1:8000
# (see infra/scripts/deploy.sh). The app serves the REST API (/ai, /blog, /stats,
# /gradevitian, …) AND mounts a public, read-only MCP server at /mcp.
#
# WHY THE STREAMING SETTINGS MATTER:
#   Two endpoints stream Server-Sent Events and must NOT be buffered by nginx:
#     - /mcp   → MCP streamable-HTTP transport (handshake + tool responses)
#     - /ai/*  → Avocado chat token stream
#   With the default `proxy_buffering on` + HTTP/1.0 upstream, nginx holds the
#   stream and the MCP handshake never completes — clients (Claude connectors)
#   then fall back to probing OAuth and report a misleading "couldn't register
#   with sign-in service / add an OAuth Client ID" error. This server is public
#   and has NO auth by design, so there is no OAuth to configure — the real fix
#   is letting the stream through. Do NOT add a Host/Origin guard or `return 421`
#   in the /mcp location: the app already validates requests, and a stray guard
#   here yields `421 Misdirected Request` and blocks every MCP client.
#
# Install / update:
#   sudo cp infra/nginx/api.jayaremala.com.conf /etc/nginx/sites-available/api.jayaremala.com
#   sudo ln -sf /etc/nginx/sites-available/api.jayaremala.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   # TLS: if the cert does not exist yet, run once:
#   #   sudo certbot --nginx -d api.jayaremala.com

# ── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name api.jayaremala.com;

    # Allow ACME HTTP-01 challenges to still resolve over :80.
    location /.well-known/acme-challenge/ { root /var/www/html; }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS: reverse proxy to the backend container ────────────────────────────
server {
    # nginx 1.24 (Ubuntu) uses the `http2` listen parameter, not the separate
    # `http2 on;` directive (that exists only in nginx 1.25.1+).
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.jayaremala.com;

    # TLS (certbot-managed paths).
    ssl_certificate     /etc/letsencrypt/live/api.jayaremala.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.jayaremala.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Resumes/blog images/etc. can be a few MB; allow generous request bodies.
    client_max_body_size 25m;

    # Single upstream for the whole app. Streaming-safe defaults so both the MCP
    # transport (/mcp) and the Avocado chat stream (/ai/*) flush immediately.
    location / {
        proxy_pass http://127.0.0.1:8000;

        proxy_http_version 1.1;                 # required for keep-alive + SSE
        proxy_set_header Connection "";          # clear "close"/"upgrade" for streaming
        proxy_set_header Host              $host;                 # forward the REAL host
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering    off;                  # do not hold SSE/MCP streams
        proxy_cache        off;
        proxy_read_timeout 3600s;                # long-lived streams
        proxy_send_timeout 3600s;

        # NOTE: CORS for /mcp is handled by the app (ScopedCORSMiddleware).
        # Do not add `add_header Access-Control-* ...` here — it would duplicate.
    }
}
