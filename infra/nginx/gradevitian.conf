# gradeVITian — gradevitian.jayaremala.com
#
# Serves the gradeVITian student-tools app from the shared Next.js static export
# (frontend/out/) that CI rsyncs to /var/www/gv-site on this Lightsail box.
#
# The app lives under the `gradevitian/` route segment, but on the subdomain the
# visitor sees clean URLs (/gpa, /login). This vhost maps those clean paths into
# the gradevitian subtree, while the shared /_next/ chunks resolve from the export
# root. The portfolio's own routes are NOT exposed here (they 404).
#
# Install:
#   sudo cp infra/nginx/gradevitian.conf /etc/nginx/sites-available/gradevitian.jayaremala.com
#   sudo ln -s /etc/nginx/sites-available/gradevitian.jayaremala.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d gradevitian.jayaremala.com   # adds the 443 block + HTTP→HTTPS redirect

server {
    listen 80;
    listen [::]:80;
    server_name gradevitian.jayaremala.com;

    root /var/www/gv-site;          # full Next static export (frontend/out/)

    # Shared Next.js build chunks (referenced as /_next/...)
    location /_next/ {
        try_files $uri =404;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # gradeVITian public assets + PWA manifest (referenced as /gradevitian/...)
    location /gradevitian/ {
        try_files $uri $uri/ =404;
    }

    # A few root-level files Next references at "/"
    location = /icon.png    { try_files $uri =404; }
    location = /favicon.ico { try_files $uri =404; }

    # Home → the gradeVITian landing page
    location = / {
        try_files /gradevitian/index.html =404;
    }

    # All other page routes → the gradeVITian subtree (clean URLs on the subdomain).
    # trailingSlash:true means every page is exported as <route>/index.html.
    location / {
        try_files /gradevitian$uri/index.html /gradevitian$uri =404;
    }
}
